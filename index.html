<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homenagem Dia das Mães - Pérola</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Playfair+Display:ital,wght@0,500;0,700;1,400;1,700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-perola: #fff9f8;
            --moldura: #f0d1d1;
            --vinho: #5e0b21;
            --vermelho-coracao: #e11d48;
            --perola-cor: radial-gradient(circle at 30% 30%, #ffffff, #fdf5f5 50%, #e8d5d5 100%);
        }

        body {
            background-color: var(--bg-perola);
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            color: var(--vinho);
        }

        .scene {
            display: none;
            height: 100vh;
            width: 100vw;
            position: absolute;
            top: 0;
            left: 0;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-sizing: border-box;
            border: 20px solid var(--moldura);
            padding: 40px;
        }

        .active {
            display: flex;
            animation: fadeIn 1.2s ease-in-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        .fade-out {
            animation: fadeOut 1s ease-in-out forwards;
        }

        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        .serif-rebuscada {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
        }

        .cursive-rebuscada {
            font-family: 'Dancing Script', cursive;
        }

        /* Corações Superiores */
        .coracao-superior {
            position: absolute;
            top: 40px;
            color: var(--vermelho-coracao);
            font-size: 2rem;
            animation: pulse 2s infinite;
        }

        .coracao-esq { left: 60px; }
        .coracao-dir { right: 60px; }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 0.7; }
        }

        /* Pérolas Inferiores */
        .perola-container {
            position: absolute;
            bottom: 40px;
            display: flex;
            gap: 10px;
        }

        .perola-esq { left: 60px; }
        .perola-dir { right: 60px; }

        .perola {
            width: 25px;
            height: 25px;
            background: var(--perola-cor);
            border-radius: 50%;
            box-shadow: inset -2px -2px 5px rgba(0,0,0,0.05), 0 5px 15px rgba(0,0,0,0.1);
            animation: float-perola 3s ease-in-out infinite;
        }

        .perola:nth-child(2) {
            animation-delay: 0.5s;
            width: 20px;
            height: 20px;
            margin-top: 5px;
        }

        @keyframes float-perola {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .text-box {
            max-width: 900px;
            width: 100%;
        }

        .progress-bar {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            height: 4px;
            width: 60%;
            background: rgba(94, 11, 33, 0.05);
            border-radius: 10px;
            z-index: 100;
        }

        #progress-fill {
            height: 100%;
            width: 0%;
            background: var(--vinho);
            transition: width 0.1s linear;
        }

        .btn-play {
            background-color: var(--vinho);
            color: white;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(94, 11, 33, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }

        .btn-play:hover {
            background-color: #7d0f2b;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <audio id="meuAudio" src="musica.mp3"></audio>

    <div class="progress-bar">
        <div id="progress-fill"></div>
    </div>

    <div id="scenes-container"></div>

    <div class="fixed bottom-12 left-0 w-full flex flex-col items-center gap-3 z-[110]">
        <button id="audioBtn" onclick="togglePlay()" class="btn-play font-bold italic">Iniciar Homenagem</button>
        <button onclick="restartVideo()" class="text-stone-400 text-[9px] uppercase tracking-[0.2em] hover:text-stone-600 transition-colors">Reiniciar</button>
    </div>

    <script>
        const texts = [
            { t: "Mãe Pérola", s: "A joia mais preciosa do meu oceano." },
            { t: "Um Brilho Único", s: "Sua alma reflete a pureza de uma pérola rara." },
            { t: "Amor que Transforma", s: "Como a concha protege sua joia, você me protegeu." },
            { t: "Vínculo Eterno", s: "Seu colo, meu primeiro e eterno refúgio." },
            { t: "Tesouro de Vida", s: "Você é a luz que ilumina o meu caminho." },
            { t: "Paz em seu Olhar", s: "Onde o meu mundo encontra calma e verdade." },
            { t: "Resiliência e Doçura", s: "A força que cria beleza em meio às minhas tempestades." },
            { t: "Mãos de Carinho", s: "O toque que cura e as palavras que me guiam." },
            { t: "Coração de Mãe", s: "Um mar infinito de amor incondicional por mim." },
            { t: "Para Sempre, Pérola", s: "Você é a minha maior riqueza hoje e sempre." },
            { t: "Início de Tudo", s: "Seu abraço foi o meu primeiro universo." },
            { t: "Beleza Divina", s: "Uma vida tecida com fios de paciência e fé." },
            { t: "Exemplo Sagrado", s: "Sigo seus passos com orgulho e admiração." },
            { t: "Sua Sabedoria", s: "Luz que me orienta quando o caminho parece incerto." },
            { t: "Pérola Preciosa", s: "Moldada pelo tempo com perfeição e amor." },
            { t: "Doçura Sem Fim", s: "O mel que adoça minhas memórias mais queridas." },
            { t: "Sua Força Silenciosa", s: "A montanha que sustenta todos os meus sonhos." },
            { t: "O Brilho da Fé", s: "Sua crença em mim é o que me faz voar." },
            { t: "Refúgio de Paz", s: "Em seus braços, o tempo parece parar para mim." },
            { t: "Gratidão Infinita", s: "Por cada sacrifício e cada sorriso doado a mim." },
            { t: "Mãe Guerreira", s: "Que luta por mim com a ternura de um anjo." },
            { t: "Sua Presença", s: "O melhor lugar do meu mundo é ao seu lado." },
            { t: "Joia Rara", s: "Nenhuma riqueza supera o seu valor para mim." },
            { t: "Luz do Amanhecer", s: "Você renova minhas esperanças todos os dias." },
            { t: "Essência de Amor", s: "O perfume que fica nas minhas melhores lembranças." },
            { t: "Caminho de Luz", s: "Você traçou a estrada da minha felicidade." },
            { t: "Minha Base", s: "O alicerce de toda a minha história de vida." },
            { t: "Mãos que Oram", s: "A proteção divina que sinto através de você." },
            { t: "Sinceridade e Verdade", s: "O espelho onde aprendi a ser alguém melhor." },
            { t: "Pérola do Coração", s: "Guardada no lugar mais sagrado da minha alma." },
            { t: "Sua Voz Suave", s: "A canção que acalma qualquer tempestade em mim." },
            { t: "Bondade Plena", s: "Sua vida é um testemunho de generosidade." },
            { t: "Orgulho em Ser Seu Filho", s: "O maior privilégio da minha existência." },
            { t: "Fonte de Vida", s: "Onde bebo o amor que me sustenta." },
            { t: "Sua Coragem", s: "Me ensina a enfrentar a vida de cabeça erguida." },
            { t: "Beleza que Não Passa", s: "A elegância de uma alma que só sabe amar." },
            { t: "Mãe Dedicada", s: "Seu coração sempre teve todo espaço para mim." },
            { t: "Infinita Ternura", s: "O toque que apaga minhas dores e traz esperança." },
            { t: "Minha Matriz", s: "O molde de onde saiu o melhor de mim." },
            { t: "Luz Perpétua", s: "Mesmo em pensamento, seu brilho me alcança." },
            { t: "Anjo Terrestre", s: "A prova de que Deus cuida de mim de perto." },
            { t: "Rainha Pérola", s: "Soberana no reino do meu afeto." },
            { t: "Amor Incondicional", s: "Que não me pede nada e me oferece o universo." },
            { t: "Feliz Dia das Mães!", s: "Com todo amor que cabe no meu coração, Bruno!" }
        ];

        const container = document.getElementById('scenes-container');
        texts.forEach((item, index) => {
            const div = document.createElement('div');
            div.id = 'scene' + (index + 1);
            div.className = 'scene';
            div.innerHTML = `
                <div class="coracao-superior coracao-esq">❤️</div>
                <div class="coracao-superior coracao-dir">❤️</div>
                
                <div class="perola-container perola-esq">
                    <div class="perola"></div>
                    <div class="perola"></div>
                </div>
                
                <div class="perola-container perola-dir">
                    <div class="perola"></div>
                    <div class="perola"></div>
                </div>

                <div class="text-box">
                    <h1 class="serif-rebuscada text-4xl md:text-7xl mb-8">${item.t}</h1>
                    <p class="cursive-rebuscada text-3xl md:text-5xl text-rose-800 leading-relaxed">${item.s}</p>
                </div>
            `;
            container.appendChild(div);
        });

        let currentScene = 1;
        const totalScenes = texts.length;
        const totalMusicSeconds = 219; 
        
        let videoInterval, progressInterval;
        const audio = document.getElementById('meuAudio');
        const progressFill = document.getElementById('progress-fill');

        function showScene(idx) {
            const scenes = document.querySelectorAll('.scene');
            scenes.forEach(s => {
                if(s.classList.contains('active')) {
                    s.classList.add('fade-out');
                    setTimeout(() => s.classList.remove('active', 'fade-out'), 1000);
                }
            });
            setTimeout(() => {
                const next = document.getElementById('scene' + idx);
                if(next) next.classList.add('active');
            }, 200);
        }

        function playSequence() {
            clearInterval(videoInterval);
            clearInterval(progressInterval);
            
            const totalDuration = totalMusicSeconds * 1000;

            progressInterval = setInterval(() => {
                const elapsed = audio.currentTime * 1000;
                const progress = (elapsed / totalDuration) * 100;
                progressFill.style.width = Math.min(progress, 100) + '%';
            }, 100);

            videoInterval = setInterval(() => {
                let sceneCalculated = Math.floor((audio.currentTime / totalMusicSeconds) * totalScenes) + 1;
                if(sceneCalculated > totalScenes) sceneCalculated = totalScenes;
                
                if(sceneCalculated !== currentScene) {
                    currentScene = sceneCalculated;
                    showScene(currentScene);
                }
            }, 500);
        }

        function togglePlay() {
            if (audio.paused) {
                audio.play().catch(() => {
                    alert("Aviso: Certifique-se de que o arquivo 'musica.mp3' está na mesma pasta do seu HTML.");
                });
                document.getElementById('audioBtn').innerText = "Pausar";
                playSequence();
            } else {
                audio.pause();
                document.getElementById('audioBtn').innerText = "Continuar";
                clearInterval(videoInterval);
                clearInterval(progressInterval);
            }
        }

        function restartVideo() {
            currentScene = 1;
            audio.currentTime = 0;
            document.querySelectorAll('.scene').forEach(s => s.classList.remove('active', 'fade-out'));
            document.getElementById('scene1').classList.add('active');
            progressFill.style.width = '0%';
            if(!audio.paused) playSequence();
        }

        window.onload = () => {
            document.getElementById('scene1').classList.add('active');
        };
    </script>
</body>
</html>
